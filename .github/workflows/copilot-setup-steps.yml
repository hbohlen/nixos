name: "Copilot NixOS Flake CI"
permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  build-flake-hosts:
    runs-on: ubuntu-latest

    env:
      NIX_SUBSTITUTERS: "https://cache.nixos.org s3://hbohlen-nix-cache?region=us-west-004&endpoint=https://s3.us-west-004.backblazeb2.com"
      NIX_TRUSTED_PUBLIC_KEYS: "cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= hbohlen-nix-cache-1:NCS/bUsN5Vjl8oEkCkvd2hztILP001j+DOAMYmiaoSQ="
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25

      - name: Configure Nix binary cache
        run: |
          echo "substituters = $NIX_SUBSTITUTERS" | sudo tee -a /etc/nix/nix.conf
          echo "trusted-public-keys = $NIX_TRUSTED_PUBLIC_KEYS" | sudo tee -a /etc/nix/nix.conf

      - name: Flake Syntax Check
        run: nix flake check

      - name: Build Desktop Host
        run: nix build .#desktop

      - name: Upload Desktop Build to Cache
        run: nix copy --to "$NIX_SUBSTITUTERS" result

      - name: Build Laptop Host
        run: nix build .#laptop

      - name: Upload Laptop Build to Cache
        run: nix copy --to "$NIX_SUBSTITUTERS" result
